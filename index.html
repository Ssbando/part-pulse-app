<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PartPulse Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #f8fafc; font-family: sans-serif; margin: 0; }
        #error-display { padding: 20px; color: #ef4444; display: none; }
    </style>
</head>
<body>
    <div id="error-display"></div>
    <div id="root"></div>

    <script>
        // Error handling to stop the "White Screen" mystery
        window.onerror = function(msg, url, line) {
            const errDiv = document.getElementById('error-display');
            errDiv.style.display = 'block';
            errDiv.innerHTML = `<strong>App Error:</strong> ${msg} <br><small>Line: ${line}</small>`;
        };

        const { useState, useEffect, createElement: h } = React;

        const App = () => {
            const [inventory, setInventory] = useState(() => {
                const saved = localStorage.getItem('partpulse_v4');
                return saved ? JSON.parse(saved) : [];
            });
            const [view, setView] = useState('inventory');
            const [showAdd, setShowAdd] = useState(false);
            const [name, setName] = useState("");
            const [price, setPrice] = useState("");

            useEffect(() => {
                localStorage.setItem('partpulse_v4', JSON.stringify(inventory));
                if (window.lucide) window.lucide.createIcons();
            }, [inventory, view, showAdd]);

            const addItem = () => {
                if (!name) return;
                setInventory([{ id: Date.now(), name, price }, ...inventory]);
                setName(""); setPrice(""); setShowAdd(false);
            };

            return h('div', { className: "max-w-md mx-auto min-h-screen pb-20" },
                h('nav', { className: "p-6 bg-white border-b flex justify-between items-center pt-12" },
                    h('h1', { className: "font-black italic text-xl text-blue-600" }, "PARTPULSE PRO"),
                    h('button', { onClick: () => setView(view === 'inventory' ? 'market' : 'inventory') }, 
                        h('i', { 'data-lucide': view === 'inventory' ? 'globe' : 'package' })
                    )
                ),
                
                view === 'inventory' ? h('div', { className: "p-4" },
                    inventory.length === 0 ? h('div', { className: "text-center py-20 text-slate-400" }, "Stockroom Empty") :
                    inventory.map(item => h('div', { key: item.id, className: "bg-white p-4 rounded-2xl mb-3 shadow-sm flex justify-between" },
                        h('span', { className: "font-bold" }, item.name),
                        h('span', { className: "text-blue-600 font-black" }, `$${item.price}`)
                    ))
                ) : h('div', { className: "p-10 text-center" }, "Market Intelligence Active"),

                h('button', { 
                    onClick: () => setShowAdd(true),
                    className: "fixed bottom-8 right-6 w-14 h-14 bg-blue-600 text-white rounded-full shadow-lg text-2xl"
                }, "+"),

                showAdd && h('div', { className: "fixed inset-0 bg-black/60 flex items-end z-50" },
                    h('div', { className: "bg-white w-full p-8 rounded-t-3xl" },
                        h('input', { className: "w-full p-4 bg-slate-100 rounded-xl mb-4", placeholder: "Part Name", onChange: e => setName(e.target.value) }),
                        h('input', { className: "w-full p-4 bg-slate-100 rounded-xl mb-6", placeholder: "Price", onChange: e => setPrice(e.target.value) }),
                        h('button', { className: "w-full bg-blue-600 text-white p-4 rounded-xl font-bold", onClick: addItem }, "SAVE PART"),
                        h('button', { className: "w-full mt-2 text-slate-400 text-sm", onClick: () => setShowAdd(false) }, "Cancel")
                    )
                )
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(h(App));
    </script>
</body>
</html>
